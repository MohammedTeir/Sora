
name: Build arm64-v8a Release APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: android-arm64-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build arm64-v8a Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APKs with ABI splits
        run: |
          ./gradlew assembleRelease \
            --parallel \
            --build-cache

      - name: Upload arm64-v8a Release APK
        uses: actions/upload-artifact@v4
        with:
          name: sora-arm64-v8a-release
          path: app/build/outputs/apk/release/*arm64-v8a*.apk
          retention-days: 14

          
